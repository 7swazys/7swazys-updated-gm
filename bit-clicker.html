<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>bit-clicker gaem</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Press Start 2P', system-ui, sans-serif;
            min-height: 100vh;
            overflow: hidden;
            background: linear-gradient(145deg, #0a0f1e 0%, #0c1222 100%);
            color: #c0e0ff;
            transition: background 2s ease, color 1.5s ease;
        }

        .entry-screen {
            position: fixed;
            inset: 0;
            background: linear-gradient(145deg, #0a0f1e 0%, #0c1222 100%);
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: opacity 0.8s ease, visibility 0.8s ease;
        }

        .entry-screen.hide {
            opacity: 0;
            visibility: hidden;
        }

        .entry-card {
            background: rgba(18, 25, 45, 0.88);
            backdrop-filter: blur(20px);
            border-radius: 2.5rem;
            border: 1px solid rgba(72, 187, 255, 0.45);
            padding: 3.5rem 4.5rem;
            text-align: center;
            box-shadow: 0 25px 45px -12px rgba(0,0,0,0.7),
                        0 0 0 1px rgba(56, 189, 248, 0.25);
            transition: transform 0.3s ease;
            animation: floatGlow 2.5s ease-in-out infinite;
        }

        .entry-card:hover { transform: scale(1.03); }

        @keyframes floatGlow {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-12px); }
        }

        .entry-title {
            font-size: 3.2rem;
            font-weight: 700;
            background: linear-gradient(135deg, #c0e0ff, #3b82f6);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            letter-spacing: 2px;
            margin-bottom: 0.8rem;
        }

        .enter-text {
            font-size: 1.1rem;
            color: #8caee0;
            letter-spacing: 6px;
            text-transform: uppercase;
            opacity: 0.85;
            transition: all 0.3s ease;
        }

        .entry-card:hover .enter-text {
            opacity: 1;
            color: #3b82f6;
        }

        #mainContent {
            padding: 2rem;
            max-width: 1200px;
            margin: 0 auto;
        }

        .game-container {
            display: flex;
            gap: 2rem;
            flex-wrap: wrap;
        }

        .clicker-area {
            flex: 1;
            min-width: 320px;
            text-align: center;
        }

        #bigHook {
            width: 280px;
            height: 280px;
            border-radius: 50%;
            margin: 2rem auto;
            cursor: pointer;
            overflow: hidden;
            transition: box-shadow 1.8s ease, transform 0.05s ease;
        }

        #bigHook img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        #bigHook:active { transform: scale(0.88); }

        .stats {
            font-size: 1.8rem;
            margin: 1rem 0;
            font-weight: 700;
            text-shadow: 0 0 10px currentColor;
        }

        .side-panel {
            flex: 1;
            min-width: 320px;
            background: rgba(18, 25, 45, 0.75);
            border-radius: 1.5rem;
            padding: 1.8rem;
            border: 1px solid rgba(72, 187, 255, 0.4);
            transition: all 2s ease;
        }

        button {
            width: 100%;
            padding: 1.1rem;
            margin: 0.7rem 0;
            background: rgba(59, 130, 246, 0.15);
            border: 2px solid #3b82f6;
            color: #c0e0ff;
            border-radius: 0.8rem;
            cursor: pointer;
            font-family: 'Press Start 2P', sans-serif;
            font-size: 0.95rem;
            transition: all 0.2s;
        }

        button:hover {
            background: rgba(59, 130, 246, 0.35);
            transform: translateY(-3px);
        }

        .rebirth-btn {
            background: linear-gradient(90deg, #7c3aed, #c026d3);
            font-weight: bold;
        }

        body.red-theme {
            background: linear-gradient(145deg, #2a0f12 0%, #3f1a1f 100%);
            color: #ffdddd;
        }

        body.red-theme .side-panel {
            background: rgba(45, 15, 18, 0.85);
            border-color: rgba(239, 68, 68, 0.6);
        }

        body.red-theme button {
            background: rgba(239, 68, 68, 0.15);
            border-color: #ef4444;
            color: #ffdddd;
        }

        body.red-theme button:hover {
            background: rgba(239, 68, 68, 0.4);
        }

        body.red-theme .rebirth-btn {
            background: linear-gradient(90deg, #b91c1c, #991b1b);
        }

        body.red-theme #bigHook {
            box-shadow: 0 0 50px #ef4444;
        }

        body.red-theme .stats {
            text-shadow: 0 0 12px #ff5555;
        }
    </style>
</head>
<body>

    <div id="entryScreen" class="entry-screen">
        <div class="entry-card">
            <div class="entry-title">bit-clicker</div>
            <div class="enter-text">ENTER</div>
        </div>
    </div>

    <div id="mainContent" style="display: none;">
        <h1 style="text-align:center; margin-bottom:2rem; font-size:2.6rem; letter-spacing: 3px;">BIT GAEM</h1>

        <div class="game-container">
            <div class="clicker-area">
                <div class="stats">BITS: <span id="bits">0</span></div>
                <div class="stats" style="font-size:1.3rem;">MULT: <span id="multiplier">1</span>x</div>
                
                <div id="bigHook">
                    <img id="githubAvatar" src="https://github.com/7swazys.png" alt="7swazys">
                </div>
                
                <div style="margin-top:1.2rem; font-size:1rem;">
                    BPS: <span id="bps">0</span>
                </div>
            </div>

            <div class="side-panel">
                <h2 style="margin-bottom:1.5rem; color:#3b82f6; font-size:1.1rem;">UPGRADES</h2>
                
                <button id="buyAuto">AUTOBIT<br><span id="autoCost">50</span></button>
                <button id="buyMultiplier">MULTIPLIER<br><span id="multiCost">200</span></button>
                <button id="buyAutoSpeed">MULTIPLIERv2<br><span id="speedCost">300</span></button>

                <hr style="margin:1.8rem 0; border-color:#26324a;">

                <button id="rebirthBtn" class="rebirth-btn" style="display:none;">
                    REBIRTH<br>
                    <small style="font-size:0.7rem;">(1000 BITS)</small>
                </button>

                <div style="margin-top:2rem; font-size:0.85rem; line-height:1.6;">
                    REBIRTHS: <span id="rebirths">0</span><br>
                    TOTAL MULT: <span id="totalMulti">1</span>x
                </div>
            </div>
        </div>
    </div>

    <script>
        const introSoundUrl = 'https://files.catbox.moe/z3dwlq.mp3';
        const clickSoundUrl = 'https://files.catbox.moe/3doj7d.mp3';
        const normalBgUrl   = 'https://files.catbox.moe/td4zxs.mp3';
        const redBgUrl      = 'https://files.catbox.moe/kovrbb.mp3';

        let clickAudio = null;
        let bgAudio = null;
        let isAudioEnabled = false;

        let bits = 5000;
        let multiplier = 1
        let rebirths = 30;
        let totalMultiplier = 10;
        let autoClickerLevel = 1;
        let autoSpeedLevel = 1;
        let isRedTheme = false;

        const entryScreen = document.getElementById('entryScreen');
        const mainContent = document.getElementById('mainContent');
        const githubAvatar = document.getElementById('githubAvatar');

        function playClickSound() {
            if (!isAudioEnabled || !clickAudio) return;
            clickAudio.currentTime = 0;
            clickAudio.play().catch(() => {});
        }

        function startBackgroundMusic(isRed = false) {
            if (!bgAudio) return;
            bgAudio.pause();
            bgAudio.src = isRed ? redBgUrl : normalBgUrl;
            bgAudio.volume = 1;
            bgAudio.loop = true;
            bgAudio.play().catch(() => {});
        }

        function updateUI() {
            document.getElementById('bits').textContent = Math.floor(bits);
            document.getElementById('multiplier').textContent = multiplier.toFixed(1);
            document.getElementById('bps').textContent = (autoClickerLevel * multiplier * (1 + autoSpeedLevel * 0.2)).toFixed(1);
            document.getElementById('rebirths').textContent = rebirths;
            document.getElementById('totalMulti').textContent = totalMultiplier.toFixed(1);

            document.getElementById('autoCost').textContent = Math.floor(50 * Math.pow(1.15, autoClickerLevel));
            document.getElementById('multiCost').textContent = Math.floor(200 * Math.pow(1.3, multiplier - 1));
            document.getElementById('speedCost').textContent = Math.floor(300 * Math.pow(1.25, autoSpeedLevel));

            document.getElementById('rebirthBtn').style.display = bits >= 1000 ? 'block' : 'none';
        }

        async function loadGitHubProfile() {
            try {
                const res = await fetch('https://api.github.com/users/7swazys');
                if (res.ok) {
                    const data = await res.json();
                    githubAvatar.src = data.avatar_url;
                }
            } catch(e) {}
        }

        // Game loop
        setInterval(() => {
            if (!isAudioEnabled) return;
            
            const autoGain = autoClickerLevel * multiplier * (1 + autoSpeedLevel * 0.1);
            bits += autoGain / 10;

            if (!isRedTheme && bits >= 100) {
                isRedTheme = true;
                document.body.classList.add('red-theme');
                startBackgroundMusic(true);
            }
            
            updateUI();
        }, 100);

        function handleClick(e) {
            if (!isAudioEnabled) return;
            
            if (e.target.closest('#bigHook') || e.target.tagName === 'BUTTON') {
                playClickSound();
            }
        }

        document.getElementById('bigHook').addEventListener('click', () => {
            if (!isAudioEnabled) return;
            bits += multiplier;
            updateUI();
        });

        document.getElementById('buyAuto').addEventListener('click', () => {
            const cost = Math.floor(50 * Math.pow(900, autoClickerLevel));
            if (bits >= cost) {
                bits -= cost;
                autoClickerLevel++;
                updateUI();
            }
        });

        document.getElementById('buyMultiplier').addEventListener('click', () => {
            const cost = Math.floor(200 * Math.pow(1.3, multiplier - 1));
            if (bits >= cost) {
                bits -= cost;
                multiplier += 400;
                updateUI();
            }
        });

        document.getElementById('buyAutoSpeed').addEventListener('click', () => {
            const cost = Math.floor(300 * Math.pow(1.25, autoSpeedLevel));
            if (bits >= cost) {
                bits -= cost;
                autoSpeedLevel++;
                updateUI();
            }
        });

        document.getElementById('rebirthBtn').addEventListener('click', () => {
            if (bits >= 1000) {
                rebirths++;
                totalMultiplier += 0.5;
                multiplier = 1 + (rebirths * 0.5);
                bits = 0;
                autoClickerLevel = 0;
                autoSpeedLevel = 0;
                updateUI();
            }
        });

        // ENTER
        entryScreen.addEventListener('click', () => {
            isAudioEnabled = true;

            clickAudio = new Audio(clickSoundUrl);
            clickAudio.volume = 0.80;

            bgAudio = new Audio(normalBgUrl);
            bgAudio.volume = 0.45;
            bgAudio.loop = true;

            const intro = new Audio(introSoundUrl);
            intro.volume = 1;
            intro.play().catch(() => {});

            entryScreen.classList.add('hide');

            setTimeout(() => {
                entryScreen.style.display = 'none';
                mainContent.style.display = 'block';

                loadGitHubProfile();
                
                setTimeout(() => {
                    startBackgroundMusic(false);
                }, 400);

                updateUI();
            }, 700);
        });

        document.addEventListener('click', handleClick);

        document.addEventListener('keydown', () => {
            if (entryScreen.style.display !== 'none') {
                entryScreen.click();
            }
        });
    </script>
</body>
</html>
